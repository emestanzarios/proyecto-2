<!-- Contact -->

<section class="container my-5 p-4 rounded" style="background-color: #C49A5A;">

    <h2 class="text-center mb-4">Contacta con nosotros</h2>

    <form id="formulario">
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" id="nombre" class="form-control" placeholder="Tu nombre">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Tu email">
        </div>

        <div class="mb-3">
            <label class="form-label">Mensaje</label>
            <textarea id="mensaje" class="form-control" rows="5" placeholder="Escribe tu mensaje"></textarea>
        </div>

        <button type="submit" class="btn text-white w-100" style="background-color: #6B3A2A; border-color: #6B3A2A;">Enviar</button>
        <div id="respuesta"></div>
    </form>

    <div class="text-center mt-4">
        <p><i class="bi bi-geo-alt-fill text-dark me-2"></i> Calle del Café 123</p>

        <p><i class="bi bi-telephone-fill text-dark me-2"></i> +34 600 123 456</p>

        <p><i class="bi bi-envelope-fill text-dark me-2"></i> contacto@coffeeshop.com</p>
    </div>

</section>
