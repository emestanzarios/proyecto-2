<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar - Coffee Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        /* ── Colores de referencia ── */
        :root {
            --cafe-crema: #F5F0E8;
            --cafe-oscuro: #3E1F00;
            --cafe-medio: #6B3A2A;
            --cafe-dorado: #C49A5A;
        }

        .navbar-cafe {
            background-color: var(--cafe-crema);
            border-bottom: 2px solid var(--cafe-dorado);
            padding: 12px 0;
        }

        /* Estilo scripts */
        .logo-text {
            font-family: Georgia, serif;
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--cafe-oscuro);
            text-decoration: none;
            line-height: 1;
        }

        .logo-sub {
            font-size: 0.7rem;
            color: var(--cafe-medio);
            display: block;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Links del navbar */
        .navbar-cafe .nav-link {
            color: var(--cafe-oscuro);
            font-weight: 500;
            font-size: 0.95rem;
            padding: 6px 14px;
            transition: color 0.2s;
        }

        .navbar-cafe .nav-link:hover {
            color: var(--cafe-dorado);
        }

        .navbar-cafe .nav-link.active {
            color: var(--cafe-dorado);
            font-weight: 600;
        }

        /* Botón CTA */
        .btn-cafe {
            background-color: var(--cafe-dorado);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-cafe:hover {
            background-color: var(--cafe-oscuro);
            color: white;
        }

        /* elimina el borde del botón hamburguesa que Bootstrap coloca de la ref <button class="navbar-toggler ms-auto"...etc etc*/
        .navbar-toggler {
            border: none;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-cafe">
        <div class="container">

            <!-- LOGO al lado izquierdo -->
            <a class="logo-text me-4" href="#">
                <!-- Por si queremos sacar una imagen - src image = (creo que va acá) -->
                Coffee
                <span class="logo-sub">& Más</span>
            </a>

            <!-- BOTÓN MÓVIL -->
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <i class="bi bi-list" style="font-size: 1.4rem; color: var(--cafe-oscuro);"></i>
            </button>

            <!-- LINKS -->
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav mx-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="portfolio.html">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contacto</a>
                    </li>
                </ul>

                <!-- BOTÓN Ordenar -->
                <a href="services.html" class="btn-cafe ms-2">
                    Ordene Acá
                </a>
            </div>

        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
